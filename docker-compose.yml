version: '3.8'

services:
   db:
      image: postgres:16-alpine
      container_name: appointment_db
      restart: always
      environment:
         POSTGRES_USER: postgres
         POSTGRES_PASSWORD: Password123!
         POSTGRES_DB: AppointmentScheduler
      ports:
         - "5432:5432"
      volumes:
         - postgres_data:/var/lib/postgresql/data

volumes:
   postgres_data: